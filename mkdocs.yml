site_name: Robert Mendoza | Technical Documentation Portfolio
site_description: Technical Documentation Portfolio showcasing user guides, process documentation, standard operating procedures, technical specifications, and accessibility-focused documentation.
site_author: Robert Mendoza
site_url: https://robert-mendoza.github.io/Technical-writing-portfolio/

repo_url: https://github.com/robert-mendoza/Technical-writing-portfolio
repo_name: robert-mendoza/Technical-writing-portfolio
edit_uri: ""

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  copyright: Copyright © 2026 Robert Mendoza

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/robert-mendoza

    # Replace with your LinkedIn profile URL
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/rbmendoza/

nav:
  - Home: index.md

  - About:
      - About Me: about.md
      - Contact: contact.md

  - Documentation Portfolio:
      - User Guide: user-guide.md
      - Standard Operating Procedure: sop-documentation.md
      - Process Documentation: process-documentation.md
      - Technical Specification: technical-documentation.md

  - Documentation Standards:
      - Documentation Standards: documentation-standards.md
      - Documentation Workflow: documentation-workflow.md

  - Resources:
      - Downloads: download.md
      - Change Log: changelog.md
