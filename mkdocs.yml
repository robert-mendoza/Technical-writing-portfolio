site_name: Robert Mendoza | Technical Documentation Portfolio
site_description: Technical Documentation Portfolio showcasing user guides, process documentation, SOPs, technical specifications, and accessibility-focused documentation.
site_author: Robert Mendoza
site_url: https://yourusername.github.io/technical-documentation/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

  palette:
    - scheme: default
      primary: blue
      accent: indigo

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - About: about.md

  - Documentation:
      - User Guide: user-guide.md
      - Process Documentation: process-documentation.md
      - Standard Operating Procedure: sop-documentation.md
      - Technical Specification: technical-documentation.md

  - Standards:
      - Documentation Workflow: documentation-workflow.md
      - Documentation Standards: documentation-standards.md

  - Resources:
      - Downloads: download.md
      - Change Log: changelog.md

  - Contact: contact.md